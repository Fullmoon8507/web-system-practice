<div class="app">
  <div class="app-header">
    <h1>ToDoリスト</h1>
    <span class="angular-badge">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 250 250"
        width="20"
        height="20"
        aria-hidden="true"
      >
        <path fill="#DD0031" d="M125 30L31.9 63.2l14.2 123.1L125 230l78.9-43.7 14.2-123.1z" />
        <path fill="#C3002F" d="M125 30v22.2-.1V230l78.9-43.7 14.2-123.1L125 30z" />
        <path
          fill="#fff"
          d="M125 52.1L66.8 182.6h21.7l11.7-29.2h49.4l11.7 29.2H183L125 52.1zm17 83.3h-34l17-40.9 17 40.9z"
        />
      </svg>
      Angular
    </span>
  </div>

  <div class="input-row">
    <input
      [(ngModel)]="newText"
      type="text"
      placeholder="新しいタスクを入力..."
      maxlength="200"
      (keydown.enter)="addTodo()"
    />
    <button (click)="addTodo()">追加</button>
  </div>

  <div class="filters">
    <button [class.active]="filter() === 'all'" (click)="setFilter('all')">すべて</button>
    <button [class.active]="filter() === 'active'" (click)="setFilter('active')">未完了</button>
    <button [class.active]="filter() === 'done'" (click)="setFilter('done')">完了済み</button>
  </div>

  <ul class="todo-list">
    @if (visible().length === 0) {
      <li class="empty">タスクがありません</li>
    } @else {
      @for (todo of visible(); track todo.id) {
        <li>
          <input
            type="checkbox"
            [checked]="todo.done"
            (change)="toggle(todo.id, $any($event.target).checked)"
            aria-label="完了切替"
          />
          <span class="todo-text" [class.done]="todo.done">{{ todo.text }}</span>
          <button class="delete-btn" (click)="delete(todo.id)" aria-label="削除">✕</button>
        </li>
      }
    }
  </ul>

  <div class="footer">
    <span>残り {{ remaining() }} / {{ total() }} 件</span>
    <button class="clear-btn" (click)="clearDone()">完了済みを削除</button>
  </div>
</div>
