<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDoリスト</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>ToDoリスト</h1>

    <div class="input-row">
      <input id="newTodo" type="text" placeholder="新しいタスクを入力..." maxlength="200" />
      <button id="addBtn">追加</button>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">すべて</button>
      <button data-filter="active">未完了</button>
      <button data-filter="done">完了済み</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="footer">
      <span id="counter"></span>
      <button class="clear-btn" id="clearDone">完了済みを削除</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
